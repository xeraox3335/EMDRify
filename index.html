<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMDRify</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="stage" aria-label="Bilateral stimulation stage"></canvas>

    <section class="controls" aria-label="Session controls">
      <h1>EMDRify</h1>
      <button id="toggleAudio" type="button">Start Audio</button>
      <label>
        Speed
        <input id="speed" type="range" min="1" max="20" step="0.5" value="8" />
      </label>
      <label>
        Tone
        <input id="tone" type="range" min="120" max="520" step="5" value="220" />
      </label>
    </section>

    <script src="renderer.js"></script>
  </body>
</html>
